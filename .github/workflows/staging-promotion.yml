name: Staging Promotion Gate

# Mandatory engineering-lead approval before code reaches staging.
# Configure required reviewers: Settings → Environments → staging-promotion

on:
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Git ref to validate for staging promotion (branch or SHA)"
        required: true
        default: "develop"

permissions:
  contents: read

jobs:
  quality-gates:
    name: Pre-staging quality gates (G1-G5)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_ref }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check

      - name: Run mandatory quality gates
        run: python scripts/run-quality-gates.py

  engineering-lead-approval:
    name: Engineering lead approval (G6)
    runs-on: ubuntu-latest
    needs: [quality-gates]
    environment: staging-promotion
    steps:
      - name: Engineering lead approval recorded
        run: |
          echo "Engineering lead approval gate passed for promotion to staging."
          echo "Source ref: ${{ inputs.source_ref }}"
          echo "Approver must be configured in the staging-promotion environment."
