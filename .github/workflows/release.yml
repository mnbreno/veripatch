name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  validate:
    name: Validate release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Parse tag version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Match pyproject version
        run: |
          PYPROJECT_VERSION=$(grep -E '^version = ' backend/pyproject.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          if [ "$PYPROJECT_VERSION" != "${{ steps.version.outputs.version }}" ]; then
            echo "Tag v${{ steps.version.outputs.version }} does not match pyproject.toml ($PYPROJECT_VERSION)"
            exit 1
          fi

      - name: Validate agent consensus
        run: python scripts/validate-release-consensus.py --version "${{ steps.version.outputs.version }}"

  test:
    name: Pre-release tests
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install and test
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          cd ..
          pytest tests/ -v --cov=veripatch --cov-fail-under=80
        env:
          PYTHONPATH: backend

  build-windows-installer:
    name: Windows installer
    runs-on: windows-latest
    needs: [validate, test]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          .\scripts\build-windows-installer.ps1 -Version $version

      - name: Build release ZIP
        shell: pwsh
        run: |
          $version = "${{ needs.validate.outputs.version }}"
          .\scripts\build-release-zip.ps1 -Version $version

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VeriPatch-Release-Assets
          path: |
            artifacts/VeriPatch-${{ needs.validate.outputs.version }}-Setup.exe
            artifacts/VeriPatch-${{ needs.validate.outputs.version }}.zip

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: [validate, build-windows-installer]
    steps:
      - uses: actions/checkout@v4

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          name: VeriPatch-Release-Assets
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: VeriPatch v${{ needs.validate.outputs.version }}
          files: |
            artifacts/VeriPatch-${{ needs.validate.outputs.version }}-Setup.exe
            artifacts/VeriPatch-${{ needs.validate.outputs.version }}.zip
          generate_release_notes: true
