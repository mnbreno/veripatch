name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  compile:
    name: "G1 Compile (100%)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check

      - name: Compilation gate
        run: python scripts/run-compile-gate.py

  unit-tests:
    name: "G2 Unit tests (90%+ pass rate)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Unit test pass-rate gate
        run: python scripts/run-unit-test-gate.py --min-pass-rate 90

  integration-tests:
    name: "G3 Integration tests"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/integration/ -v --no-cov
        env:
          PYTHONPATH: backend

  static-analysis:
    name: "G4 Static analysis"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Static analysis gate
        run: python scripts/run-static-analysis-gate.py

  governance:
    name: "G5 Governance"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate governance artifacts
        run: python scripts/check-governance-timestamps.py

  lua-gui:
    name: Lua GUI lint
    runs-on: ubuntu-latest
    needs: [compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check

      - name: Run luacheck
        run: luacheck gui/

  gui-specs:
    name: GUI specs
    runs-on: ubuntu-latest
    needs: [compile]
    steps:
      - uses: actions/checkout@v4

      - name: Install Lua and busted
        run: sudo apt-get update && sudo apt-get install -y lua5.4 luarocks

      - name: Install busted
        run: sudo luarocks install busted

      - name: Run busted GUI specs
        run: busted --config=gui/.busted gui/spec/

  feature-tests:
    name: Feature tests (apply UX + blockers)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run feature backend tests
        run: pytest tests/backend/test_apply_features.py tests/backend/test_windows_apply_errors.py -v
        env:
          PYTHONPATH: backend

      - name: Install Lua and busted
        run: sudo apt-get update && sudo apt-get install -y lua5.4 luarocks

      - name: Install busted
        run: sudo luarocks install busted

      - name: Run GUI feature specs
        run: busted --config=gui/.busted gui/spec/view_model_spec.lua

  backend-matrix:
    name: Backend matrix (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [compile, unit-tests, static-analysis]
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Pytest with coverage gate
        run: pytest tests/ -v --cov=veripatch --cov-report=xml --cov-fail-under=80
        env:
          PYTHONPATH: backend

  build-artifacts:
    name: Build artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs:
      - compile
      - unit-tests
      - integration-tests
      - static-analysis
      - governance
      - lua-gui
      - gui-specs
      - feature-tests
      - backend-matrix
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend package
        working-directory: backend
        run: |
          python -m pip install build
          python -m build --outdir ../artifacts

      - name: Package GUI sources
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell Compress-Archive -Path gui -DestinationPath artifacts/veripatch-gui.zip
          else
            tar -czf artifacts/veripatch-gui.tar.gz gui/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veripatch-${{ matrix.os }}
          path: artifacts/
          if-no-files-found: error
