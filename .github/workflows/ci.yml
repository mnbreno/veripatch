name: CI

on:
  pull_request:
    branches: [main, staging]
  push:
    branches: [main, staging]

jobs:
  backend:
    name: Backend (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        working-directory: backend
        run: ruff check veripatch ../tests

      - name: Mypy type check
        working-directory: backend
        run: mypy veripatch

      - name: Pytest
        run: pytest tests/ -v --cov=veripatch --cov-report=xml
        env:
          PYTHONPATH: backend

      - name: Upload coverage
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false

  lua-gui:
    name: Lua GUI lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install luacheck
        run: sudo apt-get update && sudo apt-get install -y lua-check

      - name: Run luacheck
        run: luacheck gui/

  build-artifacts:
    name: Build artifacts (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [backend, lua-gui]
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build backend package
        working-directory: backend
        run: |
          python -m pip install build
          python -m build --outdir ../artifacts

      - name: Package GUI sources
        shell: bash
        run: |
          mkdir -p artifacts
          if [ "${{ runner.os }}" = "Windows" ]; then
            powershell Compress-Archive -Path gui -DestinationPath artifacts/veripatch-gui.zip
          else
            tar -czf artifacts/veripatch-gui.tar.gz gui/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: veripatch-${{ matrix.os }}
          path: artifacts/
          if-no-files-found: error
